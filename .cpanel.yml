# =================================================================
# .cpanel.yml - GitHub -> cPanel auto-deploy for report.bidernet.co.il
# Live docroot: public_html/report.bidernet.co.il
# api/config.php is NEVER overwritten (DB creds/secrets live there).
# install.php / server-check.php are NEVER published (security).
# Backend (api/ sql/ docs/) deploys only if present in the repo.
# =================================================================
---
deployment:
  tasks:
    - export DEPLOYPATH=/home/biderne1/public_html/report.bidernet.co.il
    - /bin/mkdir -p "$DEPLOYPATH/api" "$DEPLOYPATH/logs"
    - /bin/cp -f index.html login.html .htaccess README.md CHANGELOG.md VERSION "$DEPLOYPATH/"
    - /usr/bin/rsync -a --exclude=config.php api/ "$DEPLOYPATH/api/" 2>/dev/null || true
    - /usr/bin/rsync -a sql/ "$DEPLOYPATH/sql/" 2>/dev/null || true
    - /usr/bin/rsync -a docs/ "$DEPLOYPATH/docs/" 2>/dev/null || true
    - /bin/rm -f "$DEPLOYPATH/install.php" "$DEPLOYPATH/server-check.php"
    - /bin/chmod 644 "$DEPLOYPATH"/api/*.php 2>/dev/null || true
    - /bin/chmod 600 "$DEPLOYPATH/api/config.php" 2>/dev/null || true
