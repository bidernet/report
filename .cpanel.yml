# =================================================================
# .cpanel.yml - GitHub to cPanel Deployment Configuration
# =================================================================
# קובץ זה מאפשר ל-cPanel לפרוס שינויים אוטומטית מ-GitHub
# כשתלחץ "Deploy HEAD Commit" - הקבצים יועתקו מ-repo לתיקיית האתר
# 
# חשוב: api/config.php לא יוחלף (כדי לא לאבד פרטי DB)

---
deployment:
  tasks:
    # נתיב היעד באתר - שנה אם הדומיין שלך במקום אחר
    - export DEPLOYPATH=/home/biderne1/public_html/report/
    
    # יצירת תיקיות במידת הצורך
    - /bin/mkdir -p $DEPLOYPATH/api
    - /bin/mkdir -p $DEPLOYPATH/sql
    - /bin/mkdir -p $DEPLOYPATH/docs
    - /bin/mkdir -p $DEPLOYPATH/logs
    
    # === העתקת קבצים ראשיים ===
    - /bin/cp index.html $DEPLOYPATH
    - /bin/cp login.html $DEPLOYPATH
    - /bin/cp .htaccess $DEPLOYPATH
    - /bin/cp README.md $DEPLOYPATH
    - /bin/cp CHANGELOG.md $DEPLOYPATH
    - /bin/cp VERSION $DEPLOYPATH
    
    # === קבצי API (חוץ מ-config.php!) ===
    - /bin/cp api/.htaccess $DEPLOYPATH/api/
    - /bin/cp api/auth.php $DEPLOYPATH/api/
    - /bin/cp api/campaigns.php $DEPLOYPATH/api/
    - /bin/cp api/clients.php $DEPLOYPATH/api/
    - /bin/cp api/db.php $DEPLOYPATH/api/
    - /bin/cp api/facebook-proxy.php $DEPLOYPATH/api/
    - /bin/cp api/helpers.php $DEPLOYPATH/api/
    - /bin/cp api/users.php $DEPLOYPATH/api/
    - /bin/cp api/config.sample.php $DEPLOYPATH/api/
    
    # === קבצי SQL ותיעוד ===
    - /bin/cp sql/schema.sql $DEPLOYPATH/sql/
    - /bin/cp docs/INSTALL.md $DEPLOYPATH/docs/
    - /bin/cp docs/API.md $DEPLOYPATH/docs/
    
    # === אם config.php עדיין לא קיים בשרת - צור אותו מהדוגמה ===
    - /bin/test -f $DEPLOYPATH/api/config.php || /bin/cp api/config.sample.php $DEPLOYPATH/api/config.php
    
    # === הרשאות נכונות ===
    - /bin/chmod 644 $DEPLOYPATH/api/*.php
    - /bin/chmod 755 $DEPLOYPATH/logs
    - /bin/chmod 600 $DEPLOYPATH/api/config.php
    
    # ===========================================
    # קבצים שלא יוחלפו אוטומטית (לאבטחה):
    # - api/config.php (פרטי DB וסיסמאות)
    # - install.php (אמור להיות מחוק)
    # - server-check.php (אמור להיות מחוק)
    # - logs/* (יומני שגיאות)
    # ===========================================
