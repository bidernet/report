# =================================================================
# .cpanel.yml - GitHub -> cPanel auto-deploy for report.bidernet.co.il
# Live docroot: public_html/report.bidernet.co.il
# Deploys the whole repo (frontend + favicon + any new files) EXCEPT:
#   - api/config.php  (DB creds/secrets - never overwritten)
#   - install.php / server-check.php  (never published - security)
#   - .git / .gitignore / .cpanel.yml / logs  (infra - not web content)
# Backend (api/ sql/ docs/) deploys only if present in the repo.
# =================================================================
---
deployment:
  tasks:
    - export DEPLOYPATH=/home/biderne1/public_html/report.bidernet.co.il
    - /bin/mkdir -p "$DEPLOYPATH/api" "$DEPLOYPATH/logs"
    - /usr/bin/rsync -a --exclude=.git --exclude=.gitignore --exclude=.cpanel.yml --exclude=install.php --exclude=server-check.php --exclude=api/config.php --exclude=logs/ ./ "$DEPLOYPATH/"
    - /bin/rm -f "$DEPLOYPATH/install.php" "$DEPLOYPATH/server-check.php"
    - /bin/chmod 600 "$DEPLOYPATH/api/config.php" 2>/dev/null || true
